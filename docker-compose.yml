version: "3.8"
services:
  mt5:
    image: gmag11/metatrader5_vnc:latest
    container_name: aurum_mt5
    init: true
    ports:
      - "127.0.0.1:8001:8001" # RPyC - Python bridge for data/trading
      - "127.0.0.1:3000:3000" # VNC web - access MT5 terminal in browser (optional)
    volumes:
      - ./config/mt5_data:/config/.wine/drive_c/Program Files/MetaTrader 5/MQL5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - VNC_PW=${MT5_VNC_PASSWORD:?set MT5_VNC_PASSWORD before starting docker compose}
    # Startup: docker compose up -d
    # Wait ~3-5 min on first boot (installs MT5 automatically)
    # Export MT5_VNC_PASSWORD with a strong secret before boot
    # Open localhost:3000 in browser -> login to broker inside MT5
    # After login, RPyC is available only on localhost:8001 by default
