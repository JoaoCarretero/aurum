[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "aurum-finance"
version = "1.0.0"
description = "Plataforma quantitativa de trading algorítmico para crypto futures"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "pandas",
    "matplotlib",
    "requests",
    "websockets",
]

[project.scripts]
aurum = "aurum_cli:main"

[tool.setuptools]
py-modules = ["aurum_cli", "backtest"]

[tool.setuptools.packages.find]
include = ["config*", "core*", "analysis*", "engines*", "bot*"]
